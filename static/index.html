<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CHONK</title>
<style>
  :root {
    --bg: #16161c;
    --panel: #22222b;
    --panel-edge: #34343f;
    --ink: #d4d4dc;
    --dim: #76768a;
    --accent: #ff6b35;
    --accent-dim: #8a3a1c;
    --hot: #ffd166;
    --green: #7cd992;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: "SF Mono", "Cascadia Mono", Menlo, Consolas, monospace;
    user-select: none;
    -webkit-user-select: none;
    overflow-x: hidden;
  }
  header {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 14px 22px;
    background: linear-gradient(180deg, #2a2a35 0%, #1f1f28 100%);
    border-bottom: 2px solid var(--accent-dim);
    box-shadow: 0 4px 16px rgba(0,0,0,0.5);
  }
  h1 {
    margin: 0;
    font-size: 22px;
    letter-spacing: 0.4em;
    color: var(--accent);
    text-shadow: 0 0 12px rgba(255,107,53,0.5);
  }
  .subtitle {
    color: var(--dim);
    font-size: 10px;
    letter-spacing: 0.2em;
  }
  .status {
    margin-left: auto;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--dim);
  }
  .status.on { color: var(--green); }
  .patch-bar {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
    padding: 10px 22px;
    background: #1a1a22;
    border-bottom: 1px solid #2a2a35;
  }
  .patch-bar select, .patch-bar input, .patch-bar button {
    background: #2a2a35;
    color: var(--ink);
    border: 1px solid #3a3a48;
    padding: 6px 12px;
    font-family: inherit;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    border-radius: 3px;
    cursor: pointer;
  }
  .patch-bar select:hover, .patch-bar button:hover { border-color: var(--accent); }
  .patch-bar button.primary {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: var(--hot);
  }
  .patch-bar button.danger { color: #ff7676; }
  .patch-bar label { font-size: 10px; color: var(--dim); letter-spacing: 0.15em; }
  .patch-select-wrap {
    display: inline-flex;
    align-items: stretch;
    gap: 2px;
  }
  .patch-select-wrap select { min-width: 12em; }
  .patch-select-wrap button {
    padding: 6px 10px;
    min-width: 32px;
    font-size: 14px;
    line-height: 1;
    letter-spacing: 0;
  }
  main {
    padding: 16px 22px 200px 22px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 12px;
  }
  .panel {
    background: var(--panel);
    border: 1px solid var(--panel-edge);
    border-radius: 6px;
    padding: 12px 14px 14px;
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.04),
      inset 0 0 18px rgba(0,0,0,0.4),
      0 2px 8px rgba(0,0,0,0.4);
  }
  .panel.wide { grid-column: span 2; }
  .panel-title {
    color: var(--accent);
    font-size: 10px;
    letter-spacing: 0.25em;
    margin-bottom: 12px;
    border-bottom: 1px dashed #3a3a48;
    padding-bottom: 6px;
  }
  .knobs {
    display: flex;
    flex-wrap: wrap;
    gap: 14px;
    justify-content: flex-start;
  }
  .knob {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 58px;
    cursor: ns-resize;
  }
  .knob svg {
    display: block;
    overflow: visible;
  }
  .knob:hover .knob-ring { stroke: var(--accent); }
  .knob.active .knob-ring { stroke: var(--hot); }
  .knob-label {
    margin-top: 4px;
    font-size: 9px;
    color: var(--dim);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    text-align: center;
  }
  .knob-value {
    margin-top: 1px;
    font-size: 9px;
    color: var(--accent);
    height: 11px;
    text-align: center;
    font-variant-numeric: tabular-nums;
  }
  .wave-buttons {
    display: flex;
    gap: 3px;
    margin-bottom: 8px;
    flex-wrap: wrap;
  }
  .wave-buttons button {
    flex: 1 1 auto;
    min-width: 28px;
    background: #2a2a35;
    color: var(--dim);
    border: 1px solid #3a3a48;
    padding: 6px 4px;
    font-family: inherit;
    font-size: 10px;
    border-radius: 3px;
    cursor: pointer;
  }
  .wave-buttons button.on {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: var(--hot);
  }
  .toggle {
    display: inline-block;
    cursor: pointer;
    padding: 6px 12px;
    background: #2a2a35;
    color: var(--dim);
    border: 1px solid #3a3a48;
    border-radius: 3px;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }
  .toggle.on {
    background: var(--accent-dim);
    color: var(--hot);
    border-color: var(--accent);
  }
  .keyboard-wrap {
    position: fixed;
    left: 0; right: 0; bottom: 0;
    padding: 12px 22px 18px;
    background: linear-gradient(180deg, #1a1a22 0%, #0e0e14 100%);
    border-top: 2px solid var(--accent-dim);
    box-shadow: 0 -4px 20px rgba(0,0,0,0.6);
    z-index: 50;
  }
  .keyboard-hint {
    font-size: 9px;
    color: var(--dim);
    letter-spacing: 0.15em;
    margin-bottom: 6px;
  }
  .keyboard-hint kbd {
    background: #2a2a35;
    padding: 1px 5px;
    border-radius: 2px;
    border: 1px solid #3a3a48;
    color: var(--ink);
    font-size: 9px;
    margin: 0 2px;
  }
  .keyboard {
    position: relative;
    height: 120px;
    display: flex;
    align-items: stretch;
    background: #0e0e14;
    border: 1px solid #2a2a35;
    border-radius: 4px;
    overflow: hidden;
  }
  .key {
    position: relative;
    flex: 1 1 0;
    border-right: 1px solid #2a2a35;
    background: linear-gradient(180deg, #e8e8e8 0%, #bababa 100%);
    cursor: pointer;
    transition: background 0.04s;
    color: #555;
    font-size: 8px;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    padding-bottom: 4px;
    letter-spacing: 0.05em;
  }
  .key.black {
    position: absolute;
    height: 65%;
    background: linear-gradient(180deg, #2a2a35 0%, #15151a 100%);
    border: 1px solid #000;
    border-radius: 0 0 3px 3px;
    z-index: 2;
    color: #aaa;
  }
  /* "held" — dim glow for the arp pool / not-currently-sounding chord notes */
  .key.held {
    background: linear-gradient(180deg, #ffbf99 0%, #c97447 100%);
    color: #fff;
  }
  .key.black.held {
    background: linear-gradient(180deg, #c97447 0%, #5e2a14 100%);
    color: #fff;
  }
  /* "active" — currently sounding; brighter, overrides held */
  .key.active {
    background: linear-gradient(180deg, var(--accent) 0%, var(--accent-dim) 100%);
    color: #fff;
    box-shadow: 0 0 14px rgba(255,107,53,0.45) inset;
  }
  .key.black.active {
    background: linear-gradient(180deg, var(--hot) 0%, var(--accent) 100%);
    color: #fff;
    box-shadow: 0 0 10px rgba(255,209,102,0.6) inset;
  }
  /* QWERTY-reachable indicator: small letter label */
  .key .kbd-label {
    position: absolute;
    bottom: 18px;
    left: 0; right: 0;
    text-align: center;
    font-size: 9px;
    font-weight: bold;
    color: rgba(0,0,0,0.45);
    letter-spacing: 0;
    pointer-events: none;
  }
  .key.black .kbd-label {
    bottom: 6px;
    color: rgba(255,255,255,0.6);
  }
  .key.active .kbd-label,
  .key.held .kbd-label {
    color: rgba(255,255,255,0.85);
  }
  ::selection { background: var(--accent-dim); }

  /* ---------- Tab bar ---------- */
  .tab-bar {
    display: flex;
    background: #14141a;
    border-bottom: 1px solid var(--panel-edge);
  }
  .tab-bar button {
    background: transparent;
    color: var(--dim);
    border: none;
    border-bottom: 2px solid transparent;
    padding: 10px 24px;
    font-family: inherit;
    font-size: 11px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    cursor: pointer;
  }
  .tab-bar button:hover { color: var(--ink); }
  .tab-bar button.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
    text-shadow: 0 0 8px rgba(255,107,53,0.4);
  }

  /* ---------- Roll view ---------- */
  #roll-view[hidden], #synth-view[hidden] { display: none !important; }
  #roll-view {
    display: flex;
    flex-direction: column;
    height: calc(100vh - 90px);
  }
  .roll-toolbar {
    display: flex;
    gap: 8px;
    align-items: center;
    padding: 8px 14px;
    background: #1a1a22;
    border-bottom: 1px solid var(--panel-edge);
    flex-wrap: wrap;
  }
  .roll-toolbar button, .roll-toolbar input[type="file"]::file-selector-button {
    background: #2a2a35;
    color: var(--ink);
    border: 1px solid #3a3a48;
    padding: 5px 11px;
    font-family: inherit;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    border-radius: 3px;
    cursor: pointer;
  }
  .roll-toolbar button:hover { border-color: var(--accent); }
  .roll-toolbar button.on {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: var(--hot);
  }
  .roll-toolbar button.rec.on {
    background: #5a1a1a;
    border-color: #ff6666;
    color: #ffaaaa;
  }
  .roll-toolbar .sep { width: 1px; height: 18px; background: var(--panel-edge); margin: 0 4px; }
  .roll-toolbar label { font-size: 10px; color: var(--dim); letter-spacing: 0.15em; }
  .roll-toolbar input[type="number"] {
    background: #2a2a35;
    color: var(--ink);
    border: 1px solid #3a3a48;
    padding: 4px 6px;
    width: 70px;
    font-family: inherit;
    font-size: 11px;
    border-radius: 3px;
  }
  .roll-canvas-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: #0e0e14;
  }
  #rollCanvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    cursor: crosshair;
    display: block;
  }
  .roll-hint {
    position: absolute;
    bottom: 6px;
    right: 10px;
    font-size: 9px;
    color: var(--dim);
    letter-spacing: 0.12em;
    pointer-events: none;
    text-transform: uppercase;
  }
</style>
</head>
<body>
<header>
  <h1>// CHONK //</h1>
  <span class="subtitle">poly subtractive · cpal · tauri</span>
  <span class="status" id="status">○ disconnected</span>
</header>

<div class="tab-bar">
  <button id="tabSynth" class="active" onclick="switchTab('synth')">Synth</button>
  <button id="tabRoll" onclick="switchTab('roll')">Roll</button>
</div>

<div id="synth-view">
<div class="patch-bar">
  <label>PATCH</label>
  <span class="patch-select-wrap">
    <button type="button" onclick="patchPrev()" title="Previous patch" aria-label="Previous patch">‹</button>
    <select id="patchList"></select>
    <button type="button" onclick="patchNext()" title="Next patch" aria-label="Next patch">›</button>
  </span>
  <button onclick="loadSelectedPatch()">Load</button>
  <input id="patchName" placeholder="new patch name" maxlength="40">
  <button class="primary" onclick="savePatch()">Save</button>
  <button class="danger" onclick="deleteSelectedPatch()">Delete</button>
  <button onclick="panic()" title="all notes off">Panic</button>
</div>

<main>
  <div class="grid" id="grid"></div>
</main>

<div class="keyboard-wrap">
  <div class="keyboard-hint">
    KBD:
    <kbd>Z</kbd><kbd>S</kbd><kbd>X</kbd><kbd>D</kbd><kbd>C</kbd><kbd>V</kbd><kbd>G</kbd><kbd>B</kbd><kbd>H</kbd><kbd>N</kbd><kbd>J</kbd><kbd>M</kbd>
    &nbsp;·&nbsp; <kbd>,</kbd><kbd>L</kbd><kbd>.</kbd><kbd>;</kbd><kbd>/</kbd>
    &nbsp;·&nbsp; <kbd>←</kbd><kbd>→</kbd> octave (<span id="octaveDisplay">3</span>)
  </div>
  <div class="keyboard" id="keyboard"></div>
</div>
</div><!-- /synth-view -->

<div id="roll-view" hidden>
  <div class="roll-toolbar">
    <button id="rollPlay" onclick="rollTogglePlay()">▶ Play</button>
    <button onclick="rollStop()">■ Stop</button>
    <button onclick="rollClearLoop()">Clear Loop</button>
    <button onclick="rollHome()" title="Home key">⇤ Home</button>
    <button id="rollRec" class="rec" onclick="rollToggleRec()">● Rec</button>
    <button onclick="rollUndo()" title="Ctrl+Z">↶ Undo</button>
    <span class="sep"></span>
    <label>BPM</label><input id="rollBpm" type="number" min="20" max="300" step="1" value="120" onchange="rollSetBpm(this.value)">
    <label>Zoom</label><input id="rollZoom" type="number" min="0.02" max="2" step="0.02" value="0.2" onchange="rollSetZoom(this.value)">
    <span class="sep"></span>
    <button onclick="rollClear()">Clear</button>
    <button onclick="rollQuantize()">Quantize 1/16</button>
    <span class="sep"></span>
    <button onclick="rollSave()">Save .jsonl</button>
    <button onclick="document.getElementById('rollLoadInput').click()">Load .jsonl</button>
    <input id="rollLoadInput" type="file" accept=".jsonl,.json,application/json" hidden onchange="rollLoad(event)">
  </div>
  <div class="roll-canvas-wrap" id="rollCanvasWrap">
    <canvas id="rollCanvas"></canvas>
    <div class="roll-hint">drag empty space: draw · click note: select · drag note: move · drag right edge: resize · del: delete · shift-click: multi · ctrl+scroll: zoom · scroll: pan</div>
  </div>
</div>

<script>
// ---------- Tauri IPC ----------
const { invoke } = window.__TAURI__.core;
const { listen } = window.__TAURI__.event;

const statusEl = document.getElementById('status');

function connect() {
  statusEl.textContent = '● connected';
  statusEl.classList.add('on');
  listen('notes', (e) => {
    const msg = e.payload;
    if (msg.type === 'notes') {
      lastSounding = msg.sounding || [];
      lastHeld = msg.held || [];
      paintKeyboard(lastSounding, lastHeld);
    }
  }).catch(err => console.warn('[chonk] listen', err));
  send({ type: 'getState' });
  send({ type: 'listPatches' });
}

async function dispatchMsg(msg) {
  return invoke('dispatch', { msg });
}

function handleServerMsg(msg) {
  if (msg.type === 'state') {
    applyPatchToUI(msg.patch);
  } else if (msg.type === 'patches') {
    const sel = document.getElementById('patchList');
    sel.innerHTML = '';
    msg.names.forEach(n => {
      const opt = document.createElement('option');
      opt.value = n; opt.textContent = n;
      sel.appendChild(opt);
    });
    if (msg.current) sel.value = msg.current;
  } else if (msg.type === 'error') {
    console.warn('[chonk]', msg.message);
  }
}

function send(o) {
  void dispatchMsg(o).then(handleServerMsg).catch(e => console.warn('[chonk]', e));
}
function sendParam(name, value) { send({ type: 'param', name, value }); }
function noteOn(note, vel) {
  if (window.rollState && rollState.recording && !rollState.playbackActive.has(note)) {
    rollCaptureNoteOn(note, vel);
  }
  send({ type: 'noteOn', note, velocity: vel });
}
function noteOff(note) {
  if (window.rollState && rollState.recording && !rollState.playbackActive.has(note)) {
    rollCaptureNoteOff(note);
  }
  send({ type: 'noteOff', note });
}
function panic() { send({ type: 'allOff' }); }

// ---------- Param defs ----------
// {name, label, min, max, default, fmt}
const KNOB = (name, label, min, max, def, fmt) => ({ name, label, min, max, def, fmt });

const WAVE_NAMES = ['SAW','SQR','TRI','SIN','NSE'];
const CHORD_NAMES = ['Off','Oct','5th','Maj','Min','Sus2','Sus4','Maj7','Min7','Dom7','Dim','Aug','Add9','Min9'];
const PATTERN_NAMES = ['Up','Down','UpDn','Rnd','Played'];

const PANELS = [
  {
    title: 'OSC 1',
    selectors: [{ param: 'osc1_wave', names: WAVE_NAMES }],
    knobs: [
      KNOB('osc1_detune', 'Detune', -50, 50, -7, v => v.toFixed(0)+'c'),
      KNOB('osc1_level', 'Level', 0, 1, 0.7, v => v.toFixed(2)),
    ],
  },
  {
    title: 'OSC 2',
    selectors: [{ param: 'osc2_wave', names: WAVE_NAMES }],
    knobs: [
      KNOB('osc2_detune', 'Detune', -50, 50, 7, v => v.toFixed(0)+'c'),
      KNOB('osc2_level', 'Level', 0, 1, 0.7, v => v.toFixed(2)),
      KNOB('osc2_octave', 'Oct', -2, 2, 0, v => {
        const r = Math.round(v); return (r>=0?'+':'')+r;
      }, { step: 1 }),
    ],
  },
  {
    title: 'CHORD',
    selectors: [{ param: 'chord_type', names: CHORD_NAMES }],
    knobs: [],
  },
  {
    title: 'ARP',
    selectors: [{ param: 'arp_pattern', names: PATTERN_NAMES }],
    knobs: [
      KNOB('arp_rate', 'Rate', 0.5, 30, 6.0, v => v.toFixed(1)+'Hz'),
      KNOB('arp_gate', 'Gate', 0.05, 0.95, 0.5, v => v.toFixed(2)),
      KNOB('arp_octaves', 'Oct', 1, 4, 1, v => Math.round(v).toString(), { step: 1 }),
    ],
    toggle: { param: 'arp_enabled', label: 'ARP ON' },
  },
  {
    title: 'MIX',
    knobs: [
      KNOB('sub_level', 'Sub', 0, 1, 0.5, v => v.toFixed(2)),
      KNOB('noise_level', 'Noise', 0, 1, 0.0, v => v.toFixed(2)),
    ],
  },
  {
    title: 'FILTER',
    knobs: [
      KNOB('filter_cutoff', 'Cutoff', 0, 1, 0.45, v => {
        const hz = 20 * Math.pow(1000, v);
        return hz < 1000 ? hz.toFixed(0)+'Hz' : (hz/1000).toFixed(1)+'k';
      }),
      KNOB('filter_resonance', 'Res', 0, 1, 0.35, v => v.toFixed(2)),
      KNOB('filter_env_amount', 'Env', -1, 1, 0.55, v => v.toFixed(2)),
      KNOB('filter_drive', 'Drive', 0, 1, 0.4, v => v.toFixed(2)),
      KNOB('filter_keytrack', 'KeyTrk', 0, 1, 0.3, v => v.toFixed(2)),
    ],
  },
  {
    title: 'AMP ENV',
    knobs: [
      KNOB('amp_a', 'A', 0.001, 4, 0.005, v => fmtTime(v), { exp: true }),
      KNOB('amp_d', 'D', 0.001, 4, 0.2, v => fmtTime(v), { exp: true }),
      KNOB('amp_s', 'S', 0, 1, 0.7, v => v.toFixed(2)),
      KNOB('amp_r', 'R', 0.001, 6, 0.3, v => fmtTime(v), { exp: true }),
    ],
  },
  {
    title: 'FILT ENV',
    knobs: [
      KNOB('fenv_a', 'A', 0.001, 4, 0.005, v => fmtTime(v), { exp: true }),
      KNOB('fenv_d', 'D', 0.001, 4, 0.25, v => fmtTime(v), { exp: true }),
      KNOB('fenv_s', 'S', 0, 1, 0.2, v => v.toFixed(2)),
      KNOB('fenv_r', 'R', 0.001, 6, 0.3, v => fmtTime(v), { exp: true }),
    ],
  },
  {
    title: 'LFO',
    knobs: [
      KNOB('lfo_rate', 'Rate', 0.05, 20, 2.0, v => v.toFixed(2)+'Hz', { exp: true }),
      KNOB('lfo_to_cutoff', '→Cutoff', 0, 1, 0.0, v => v.toFixed(2)),
      KNOB('lfo_to_pitch', '→Pitch', 0, 1, 0.0, v => v.toFixed(2)),
    ],
  },
  {
    title: 'DIST',
    selectors: [{ param: 'dist_type', names: ['Soft','Hard','Fold','Crush'] }],
    knobs: [
      KNOB('dist_drive', 'Drive', 0, 1, 0.3, v => v.toFixed(2)),
      KNOB('dist_tone', 'Tone', 0, 1, 0.7, v => v.toFixed(2)),
      KNOB('dist_mix', 'Mix', 0, 1, 1.0, v => v.toFixed(2)),
    ],
    toggle: { param: 'dist_enabled', label: 'DIST ON' },
  },
  {
    title: 'MULTIBAND COMP',
    wide: true,
    knobs: [
      KNOB('comp_xover_low', 'X-Lo', 50, 500, 200, v => v.toFixed(0)+'Hz'),
      KNOB('comp_xover_high', 'X-Hi', 1000, 6000, 2000, v => (v/1000).toFixed(1)+'k'),
      KNOB('comp_threshold', 'Thresh', -60, 0, -18, v => v.toFixed(0)+'dB'),
      KNOB('comp_ratio', 'Ratio', 1, 20, 4, v => v.toFixed(1)+':1'),
      KNOB('comp_upward_ratio', 'Up Ratio', 1, 20, 1, v => v.toFixed(1)+':1'),
      KNOB('comp_upward_range', 'Up Rng', 0, 24, 12, v => v.toFixed(0)+'dB'),
      KNOB('comp_attack', 'Atk', 0.0001, 0.2, 0.005, v => fmtTime(v)),
      KNOB('comp_release', 'Rel', 0.01, 1.0, 0.1, v => fmtTime(v)),
      KNOB('comp_gain_low', 'Lo dB', -12, 24, 0, v => (v>=0?'+':'')+v.toFixed(1)),
      KNOB('comp_gain_mid', 'Mid dB', -12, 24, 0, v => (v>=0?'+':'')+v.toFixed(1)),
      KNOB('comp_gain_high', 'Hi dB', -12, 24, 0, v => (v>=0?'+':'')+v.toFixed(1)),
    ],
    toggle: { param: 'comp_enabled', label: 'COMP ON' },
  },
  {
    title: 'MASTER',
    knobs: [
      KNOB('master_volume', 'Vol', 0, 1, 0.55, v => v.toFixed(2)),
      KNOB('master_drive', 'Drive', 0, 1, 0.2, v => v.toFixed(2)),
      KNOB('glide', 'Glide', 0, 1, 0.0, v => fmtTime(v)),
    ],
    toggle: { param: 'mono', label: 'MONO' },
  },
];

function fmtTime(v) {
  if (v < 0.01) return (v*1000).toFixed(1)+'ms';
  if (v < 1) return (v*1000).toFixed(0)+'ms';
  return v.toFixed(2)+'s';
}

// Map UI 0..1 normalized position to actual value (and back).
function norm2val(k, t) {
  if (k.opts && k.opts.exp) {
    const lo = Math.log(k.min), hi = Math.log(k.max);
    return Math.exp(lo + t * (hi - lo));
  }
  return k.min + t * (k.max - k.min);
}
function val2norm(k, v) {
  if (k.opts && k.opts.exp) {
    const lo = Math.log(k.min), hi = Math.log(k.max);
    return (Math.log(Math.max(k.min, v)) - lo) / (hi - lo);
  }
  return (v - k.min) / (k.max - k.min);
}

// ---------- Build UI ----------
const knobRegistry = {};
const selectorRegistry = {};
const toggleRegistry = {};

function buildUI() {
  const grid = document.getElementById('grid');
  for (const panel of PANELS) {
    const div = document.createElement('div');
    div.className = 'panel' + (panel.wide ? ' wide' : '');
    const title = document.createElement('div');
    title.className = 'panel-title';
    title.textContent = panel.title;
    div.appendChild(title);

    if (panel.selectors) {
      for (const sel of panel.selectors) {
        const row = document.createElement('div');
        row.className = 'wave-buttons';
        const buttons = [];
        sel.names.forEach((label, i) => {
          const b = document.createElement('button');
          b.textContent = label;
          b.onclick = () => setSelector(sel.param, i);
          row.appendChild(b);
          buttons.push(b);
        });
        selectorRegistry[sel.param] = buttons;
        div.appendChild(row);
      }
    }

    const knobs = document.createElement('div');
    knobs.className = 'knobs';
    for (const k of panel.knobs) {
      // Pull opts off the last arg if present (KNOB doesn't formally take opts; handle via extension)
      const knob = makeKnob({
        name: k.name,
        label: k.label,
        min: k.min,
        max: k.max,
        def: k.def,
        fmt: k.fmt,
        opts: extractOpts(k),
      });
      knobs.appendChild(knob.el);
      knobRegistry[k.name] = knob;
    }
    div.appendChild(knobs);

    if (panel.toggle) {
      const t = document.createElement('span');
      t.className = 'toggle';
      t.textContent = panel.toggle.label;
      t.onclick = () => {
        const cur = toggleRegistry[panel.toggle.param].state;
        setToggle(panel.toggle.param, cur ? 0 : 1);
      };
      div.appendChild(t);
      toggleRegistry[panel.toggle.param] = { el: t, state: false };
    }

    grid.appendChild(div);
  }
}

// KNOB() doesn't pass opts explicitly; reconstruct from the call by scanning fmt source if needed.
// Cleaner: extend signature. We do that now: each entry can have a 6th arg "opts".
// To keep PANELS readable above, treat the 6th positional argument as opts.
function extractOpts(k) {
  // The KNOB factory only put { name,label,min,max,def,fmt } on the object.
  // We need to fish opts back out — re-define KNOB carefully:
  return k._opts || {};
}
// Patch the KNOB function to capture opts:
// (We monkey-patch entries already created.)
(function fixOpts() {
  // Re-walk PANELS and inject opts from the original definition sites (already lost).
  // Instead, we look up by name and reapply known exp flags.
  const expNames = new Set([
    'amp_a','amp_d','amp_r','fenv_a','fenv_d','fenv_r','lfo_rate','arp_rate',
    'comp_attack','comp_release','comp_xover_low','comp_xover_high',
  ]);
  const stepNames = { osc2_octave: 1, arp_octaves: 1 };
  for (const panel of PANELS) {
    for (const k of panel.knobs) {
      k._opts = {};
      if (expNames.has(k.name)) k._opts.exp = true;
      if (stepNames[k.name]) k._opts.step = stepNames[k.name];
    }
  }
})();

function makeKnob({ name, label, min, max, def, fmt, opts }) {
  const root = document.createElement('div');
  root.className = 'knob';
  const SIZE = 50, CX = SIZE/2, CY = SIZE/2, R = 19;
  // Knob sweeps -135deg .. +135deg (270 deg total)
  const A_MIN = -135 * Math.PI / 180;
  const A_MAX =  135 * Math.PI / 180;

  const svgNS = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(svgNS, 'svg');
  svg.setAttribute('width', SIZE);
  svg.setAttribute('height', SIZE);

  // Outer bezel
  const bezel = document.createElementNS(svgNS, 'circle');
  bezel.setAttribute('cx', CX); bezel.setAttribute('cy', CY);
  bezel.setAttribute('r', R+3);
  bezel.setAttribute('fill', '#1a1a22');
  bezel.setAttribute('stroke', '#0a0a10');
  bezel.setAttribute('stroke-width', '1');
  svg.appendChild(bezel);

  // Background arc (full sweep)
  const bgArc = document.createElementNS(svgNS, 'path');
  bgArc.setAttribute('d', arcPath(CX, CY, R, A_MIN, A_MAX));
  bgArc.setAttribute('fill', 'none');
  bgArc.setAttribute('stroke', '#34343f');
  bgArc.setAttribute('stroke-width', '3');
  bgArc.setAttribute('stroke-linecap', 'round');
  svg.appendChild(bgArc);

  // Value arc
  const valArc = document.createElementNS(svgNS, 'path');
  valArc.setAttribute('class', 'knob-ring');
  valArc.setAttribute('fill', 'none');
  valArc.setAttribute('stroke', '#ff6b35');
  valArc.setAttribute('stroke-width', '3');
  valArc.setAttribute('stroke-linecap', 'round');
  svg.appendChild(valArc);

  // Cap
  const cap = document.createElementNS(svgNS, 'circle');
  cap.setAttribute('cx', CX); cap.setAttribute('cy', CY);
  cap.setAttribute('r', R-5);
  cap.setAttribute('fill', '#2a2a35');
  cap.setAttribute('stroke', '#444');
  cap.setAttribute('stroke-width', '1');
  svg.appendChild(cap);

  // Indicator line
  const tick = document.createElementNS(svgNS, 'line');
  tick.setAttribute('stroke', '#ffd166');
  tick.setAttribute('stroke-width', '2');
  tick.setAttribute('stroke-linecap', 'round');
  svg.appendChild(tick);

  root.appendChild(svg);

  const labelEl = document.createElement('div');
  labelEl.className = 'knob-label';
  labelEl.textContent = label;

  const valueEl = document.createElement('div');
  valueEl.className = 'knob-value';

  root.appendChild(valueEl);
  root.appendChild(labelEl);

  let value = def;
  const bipolar = (min < 0 && max > 0);

  function arcPath(cx, cy, r, a0, a1) {
    const large = (a1 - a0) > Math.PI ? 1 : 0;
    const x0 = cx + r*Math.cos(a0), y0 = cy + r*Math.sin(a0);
    const x1 = cx + r*Math.cos(a1), y1 = cy + r*Math.sin(a1);
    return `M ${x0} ${y0} A ${r} ${r} 0 ${large} 1 ${x1} ${y1}`;
  }

  function render() {
    const t = val2norm({min,max,opts}, value);
    const a = A_MIN + Math.max(0, Math.min(1, t)) * (A_MAX - A_MIN);
    // Indicator
    const ix0 = CX + (R-9)*Math.cos(a);
    const iy0 = CY + (R-9)*Math.sin(a);
    const ix1 = CX + (R-1)*Math.cos(a);
    const iy1 = CY + (R-1)*Math.sin(a);
    tick.setAttribute('x1', ix0); tick.setAttribute('y1', iy0);
    tick.setAttribute('x2', ix1); tick.setAttribute('y2', iy1);
    // Value arc
    if (bipolar) {
      const aCenter = (A_MIN + A_MAX) / 2;
      if (a >= aCenter) valArc.setAttribute('d', arcPath(CX,CY,R, aCenter, a));
      else valArc.setAttribute('d', arcPath(CX,CY,R, a, aCenter));
    } else {
      valArc.setAttribute('d', arcPath(CX,CY,R, A_MIN, a));
    }
    valueEl.textContent = fmt ? fmt(value) : value.toFixed(2);
  }

  function setValue(v, send) {
    if (opts.step) v = Math.round(v / opts.step) * opts.step;
    if (v < min) v = min;
    if (v > max) v = max;
    value = v;
    render();
    if (send !== false) sendParam(name, value);
  }

  // Vertical drag
  let dragging = false;
  let dragStartY = 0;
  let dragStartNorm = 0;
  svg.style.cursor = 'ns-resize';
  svg.addEventListener('pointerdown', (e) => {
    dragging = true;
    root.classList.add('active');
    dragStartY = e.clientY;
    dragStartNorm = val2norm({min,max,opts}, value);
    svg.setPointerCapture(e.pointerId);
    e.preventDefault();
  });
  svg.addEventListener('pointermove', (e) => {
    if (!dragging) return;
    const dy = dragStartY - e.clientY;
    const fineMul = e.shiftKey ? 0.2 : 1.0;
    const dnorm = dy / 180 * fineMul;
    const t = Math.max(0, Math.min(1, dragStartNorm + dnorm));
    setValue(norm2val({min,max,opts}, t), true);
  });
  svg.addEventListener('pointerup', (e) => {
    dragging = false;
    root.classList.remove('active');
    svg.releasePointerCapture(e.pointerId);
  });
  // Double-click to reset
  svg.addEventListener('dblclick', () => setValue(def, true));
  // Wheel
  svg.addEventListener('wheel', (e) => {
    e.preventDefault();
    const t0 = val2norm({min,max,opts}, value);
    const mul = e.shiftKey ? 0.005 : 0.02;
    const t = Math.max(0, Math.min(1, t0 - Math.sign(e.deltaY) * mul));
    setValue(norm2val({min,max,opts}, t), true);
  }, { passive: false });

  setValue(def, false);
  return { el: root, setValue, get value() { return value; }, opts };
}

function setSelector(param, idx, send=true) {
  if (send) sendParam(param, idx);
  const btns = selectorRegistry[param];
  if (!btns) return;
  btns.forEach((b,i) => b.classList.toggle('on', i === idx));
}
function setToggle(param, state, send=true) {
  if (send) sendParam(param, state ? 1 : 0);
  const t = toggleRegistry[param];
  if (!t) return;
  t.state = !!state;
  t.el.classList.toggle('on', !!state);
}

function applyPatchToUI(patch) {
  // On any state load: clear local keyboard hold tracking and visuals — the server
  // will repaint the keyboard via the `notes` broadcast as soon as state changes.
  heldKeys.clear();
  lastSounding = [];
  lastHeld = [];
  document.querySelectorAll('.key.active, .key.held').forEach(el => {
    el.classList.remove('active', 'held');
  });

  for (const name in patch) {
    if (knobRegistry[name]) {
      knobRegistry[name].setValue(patch[name], false);
    } else if (selectorRegistry[name]) {
      setSelector(name, Math.round(patch[name]), false);
    } else if (toggleRegistry[name]) {
      setToggle(name, patch[name] > 0.5, false);
    }
  }
}

function paintKeyboard(sounding, held) {
  const soundingSet = new Set(sounding);
  const heldSet = new Set(held);
  document.querySelectorAll('.key').forEach(el => {
    const n = parseInt(el.dataset.note, 10);
    el.classList.toggle('active', soundingSet.has(n));
    el.classList.toggle('held', heldSet.has(n) && !soundingSet.has(n));
  });
}

// ---------- Patch I/O ----------
function loadSelectedPatch() {
  const name = document.getElementById('patchList').value;
  if (name) send({ type: 'loadPatch', name });
}
function patchPrev() {
  const sel = document.getElementById('patchList');
  const n = sel.options.length;
  if (!n) return;

  sel.selectedIndex = i <= 0 ? n - 1 : i - 1;

}
function patchNext() {
  const sel = document.getElementById('patchList');
  const n = sel.options.length;
  if (!n) return;
  const i = sel.selectedIndex;
  sel.selectedIndex = i < 0 || i >= n - 1 ? 0 : i + 1;

}
async function savePatch() {
  const name = document.getElementById('patchName').value.trim();
  if (!name) return alert('enter a patch name');
  await dispatchMsg({ type: 'savePatch', name }).then(handleServerMsg);
  const list = await dispatchMsg({ type: 'listPatches' });

}
async function deleteSelectedPatch() {

  await dispatchMsg({ type: 'deletePatch', name }).then(handleServerMsg);

  handleServerMsg(list);
}

// ---------- Keyboard ----------
// Last-known state from server, replayed onto freshly built keys after octave shift.
let lastSounding = [];
let lastHeld = [];

function kbdRange() {
  // Show four octaves anchored to the current QWERTY octave.
  const lo = Math.max(0, Math.min(127 - 48, 12 * kbdOctave));
  const hi = Math.min(127, lo + 48);
  return [lo, hi];
}

function buildKeyboard() {
  const wrap = document.getElementById('keyboard');
  wrap.innerHTML = '';
  const [KEY_MIN, KEY_MAX] = kbdRange();
  const whites = [];
  for (let m = KEY_MIN; m <= KEY_MAX; m++) {
    const c = m % 12;
    if ([1,3,6,8,10].includes(c)) continue;
    whites.push(m);
  }
  const whiteWidthPct = 100 / whites.length;
  whites.forEach((m) => {
    const k = document.createElement('div');
    k.className = 'key';
    k.dataset.note = m;
    k.style.flex = '1 1 0';
    const name = midiName(m);
    if (name.startsWith('C')) {
      k.innerHTML = `<span>${name}</span>`;
    }
    attachKeyEvents(k, m);
    wrap.appendChild(k);
  });
  // Black keys overlay
  for (let m = KEY_MIN; m <= KEY_MAX; m++) {
    const c = m % 12;
    if (![1,3,6,8,10].includes(c)) continue;
    const prevWhite = m - 1;
    const idx = whites.indexOf(prevWhite);
    if (idx < 0) continue;
    const left = (idx + 1) * whiteWidthPct - whiteWidthPct * 0.32;
    const k = document.createElement('div');
    k.className = 'key black';
    k.dataset.note = m;
    k.style.left = `calc(${left}% )`;
    k.style.width = `${whiteWidthPct * 0.64}%`;
    attachKeyEvents(k, m);
    wrap.appendChild(k);
  }
  decorateKbdMappedKeys();
  paintKeyboard(lastSounding, lastHeld);
}

// Mark keys reachable from the current QWERTY mapping, and show the letter on them.
function decorateKbdMappedKeys() {
  // Inverse map: midi -> letter (lowest letter wins if duplicates)
  const noteToKey = {};
  for (const [letter, off] of Object.entries(KBD_TO_OFFSET)) {
    const n = 12 * (kbdOctave + 1) + off;
    if (n < 0 || n > 127) continue;
    if (!(n in noteToKey)) noteToKey[n] = letter.toUpperCase();
  }
  document.querySelectorAll('.key').forEach(el => {
    const n = parseInt(el.dataset.note, 10);
    const letter = noteToKey[n];
    // Remove old label if any
    const old = el.querySelector('.kbd-label');
    if (old) old.remove();
    if (letter) {
      const lab = document.createElement('span');
      lab.className = 'kbd-label';
      lab.textContent = letter;
      el.appendChild(lab);
    }
  });
}
function midiName(m) {
  const names = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
  return names[m % 12] + Math.floor(m/12 - 1);
}
function attachKeyEvents(el, note) {
  let down = false;
  el.addEventListener('pointerdown', (e) => {
    down = true;
    noteOn(note, 0.85);
    el.setPointerCapture(e.pointerId);
  });
  const release = () => {
    if (!down) return;
    down = false;
    noteOff(note);
  };
  el.addEventListener('pointerup', release);
  el.addEventListener('pointercancel', release);
  el.addEventListener('pointerleave', (e) => {
    if (down && e.buttons === 0) release();
  });
}

// ---------- Computer keyboard ----------
let kbdOctave = 3; // C-key plays midi 12*(kbdOctave+1) = 48 when kbdOctave=3 (C3 in some maps)
function refreshOctaveDisplay() {
  document.getElementById('octaveDisplay').textContent = kbdOctave;
}
const KBD_TO_OFFSET = {
  'z':0,'s':1,'x':2,'d':3,'c':4,'v':5,'g':6,'b':7,'h':8,'n':9,'j':10,'m':11,
  ',':12,'l':13,'.':14,';':15,'/':16,
  'q':12,'2':13,'w':14,'3':15,'e':16,'r':17,'5':18,'t':19,'6':20,'y':21,'7':22,'u':23,
  'i':24,'9':25,'o':26,'0':27,'p':28,
};
const heldKeys = new Set();
function shiftOctave(delta) {
  // Release any computer-keyboard notes held at the *current* octave before swapping,
  // otherwise the eventual keyup releases the wrong MIDI note and the old one hangs.
  for (const k of heldKeys) {
    const note = 12 * (kbdOctave + 1) + KBD_TO_OFFSET[k];
    if (note >= 0 && note <= 127) noteOff(note);
  }
  heldKeys.clear();

  const target = Math.max(0, Math.min(7, kbdOctave + delta));
  if (target === kbdOctave) return;
  kbdOctave = target;
  refreshOctaveDisplay();
  buildKeyboard();
}

document.addEventListener('keydown', (e) => {
  if (e.repeat) return;
  // Never fire synth notes on modifier combos (Ctrl+Z, Ctrl+S, etc.).
  if (e.ctrlKey || e.metaKey || e.altKey) return;
  if (e.target && (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT')) return;
  const k = e.key.toLowerCase();
  if (k === 'arrowleft') { shiftOctave(-1); return; }
  if (k === 'arrowright') { shiftOctave(1); return; }
  if (k === ' ') { panic(); return; }
  if (k in KBD_TO_OFFSET && !heldKeys.has(k)) {
    heldKeys.add(k);
    const note = 12 * (kbdOctave + 1) + KBD_TO_OFFSET[k];
    if (note >= 0 && note <= 127) noteOn(note, 0.85);
  }
});
document.addEventListener('keyup', (e) => {
  const k = e.key.toLowerCase();
  if (heldKeys.has(k)) {
    heldKeys.delete(k);
    const note = 12 * (kbdOctave + 1) + KBD_TO_OFFSET[k];
    if (note >= 0 && note <= 127) noteOff(note);
  }
});
window.addEventListener('blur', () => {
  heldKeys.forEach(k => {
    const note = 12 * (kbdOctave + 1) + KBD_TO_OFFSET[k];
    if (note >= 0 && note <= 127) noteOff(note);
  });
  heldKeys.clear();
});

// ---------- Tabs ----------
function switchTab(name) {
  document.getElementById('synth-view').hidden = (name !== 'synth');
  document.getElementById('roll-view').hidden = (name !== 'roll');
  document.getElementById('tabSynth').classList.toggle('active', name === 'synth');
  document.getElementById('tabRoll').classList.toggle('active', name === 'roll');
  if (name === 'roll') {
    rollResize();
    rollRender();
  }
}

// ===================== ROLL =====================
const ROLL_PITCH_LOW = 21;   // A0
const ROLL_PITCH_HIGH = 108; // C8
const ROLL_LABEL_W = 48;
const ROLL_RULER_H = 34;
const ROLL_RESIZE_EDGE = 6;   // px on right edge of note for resize hit-test
const ROLL_LOOP_HANDLE = 8;   // px wide drag handles for loop region
const ROLL_DRAG_THRESHOLD = 3; // px before a mousedown becomes a drag
const ROLL_UNDO_LIMIT = 100;

const rollState = {
  notes: [],                  // {id, pitch, start, dur, vel, ch}
  nextId: 1,
  viewport: {
    scrollX: 0,               // leftmost visible ms
    scrollY: 0,               // pitch offset from top, fractional rows
    pxPerMs: 0.2,             // zoom (also written to #rollZoom)
    rowHeight: 16,
  },
  hoveredPitch: null,         // for row highlight
  undo: [],                   // snapshot stack
  auditionPitch: null,        // pitch currently sounded while drawing/moving
  bpm: 120,
  selection: new Set(),       // note ids
  transport: {
    playing: false,
    cursorMs: 0,
    startWall: 0,             // performance.now() when last started
    cursorAtStart: 0,
    looping: false,
    loopStart: 0,
    loopEnd: 4000,
    activeOffs: new Map(),    // id -> { offMs, pitch }
  },
  recording: false,
  recordingNotes: new Map(),  // pitch -> in-progress note (start time, captured note obj)
  playbackActive: new Set(),  // pitches the transport currently sounds (don't record)
  mouse: {
    mode: 'idle',             // idle | draw | move | resize | marquee | loopL | loopR | scrollPan | rulerPending | rulerLoop
    startX: 0, startY: 0,
    lastX: 0, lastY: 0,
    drawNoteId: null,
    dragOffsetMs: 0,
    dragOffsetPitch: 0,
    moveOriginals: null,      // map id -> {start, pitch} at drag start
    movePivotId: null,        // id of the note whose pitch drives audition during move
    resizeOriginalDur: 0,
    rulerDownMs: 0,
  },
};

const rollCanvas = document.getElementById('rollCanvas');
const rollWrap = document.getElementById('rollCanvasWrap');
const rctx = rollCanvas.getContext('2d');

function rollResize() {
  const dpr = window.devicePixelRatio || 1;
  const w = rollWrap.clientWidth;
  const h = rollWrap.clientHeight;
  rollCanvas.width = w * dpr;
  rollCanvas.height = h * dpr;
  rctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener('resize', () => { rollResize(); rollRender(); });

// ---------- Coordinate helpers ----------
function rollW() { return rollWrap.clientWidth; }
function rollH() { return rollWrap.clientHeight; }
function msToX(ms) { return ROLL_LABEL_W + (ms - rollState.viewport.scrollX) * rollState.viewport.pxPerMs; }
function xToMs(x) { return rollState.viewport.scrollX + (x - ROLL_LABEL_W) / rollState.viewport.pxPerMs; }
function pitchToY(p) {
  const v = rollState.viewport;
  return ROLL_RULER_H + (ROLL_PITCH_HIGH - p - v.scrollY) * v.rowHeight;
}
function yToPitch(y) {
  const v = rollState.viewport;
  return Math.floor(ROLL_PITCH_HIGH - v.scrollY - (y - ROLL_RULER_H) / v.rowHeight + 1);
}
function visiblePitchRange() {
  const top = yToPitch(ROLL_RULER_H);
  const bot = yToPitch(rollH());
  return [Math.max(ROLL_PITCH_LOW, bot - 1), Math.min(ROLL_PITCH_HIGH, top + 1)];
}
function visibleMsRange() {
  return [xToMs(ROLL_LABEL_W), xToMs(rollW())];
}
function isBlackKey(p) { return [1,3,6,8,10].includes(p % 12); }
function pitchName(p) {
  const names = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
  return names[p % 12] + (Math.floor(p / 12) - 1);
}

// ---------- Render ----------
let rollRenderQueued = false;
function rollRender() {
  if (rollRenderQueued) return;
  rollRenderQueued = true;
  requestAnimationFrame(() => {
    rollRenderQueued = false;
    rollDraw();
  });
}
function rollDraw() {
  const w = rollW(), h = rollH();
  const v = rollState.viewport;
  rctx.fillStyle = '#0e0e14';
  rctx.fillRect(0, 0, w, h);

  // Row stripes (black/white key bands).
  const [pLo, pHi] = visiblePitchRange();
  for (let p = pLo; p <= pHi; p++) {
    const y = pitchToY(p);
    rctx.fillStyle = isBlackKey(p) ? '#15151c' : '#1c1c25';
    rctx.fillRect(ROLL_LABEL_W, y, w - ROLL_LABEL_W, v.rowHeight);
    if (p % 12 === 0) {
      rctx.fillStyle = '#222230';
      rctx.fillRect(ROLL_LABEL_W, y + v.rowHeight - 1, w - ROLL_LABEL_W, 1);
    }
  }

  // Hovered row highlight.
  if (rollState.hoveredPitch != null) {
    const hp = rollState.hoveredPitch;
    if (hp >= pLo && hp <= pHi) {
      const y = pitchToY(hp);
      rctx.fillStyle = 'rgba(255,107,53,0.10)';
      rctx.fillRect(ROLL_LABEL_W, y, w - ROLL_LABEL_W, v.rowHeight);
    }
  }

  // Beat grid (assumes 4/4).
  const beatMs = 60000 / rollState.bpm;
  const subdivMs = beatMs / 4; // 1/16
  const [msLo, msHi] = visibleMsRange();
  const firstSub = Math.floor(msLo / subdivMs) * subdivMs;
  for (let m = firstSub; m <= msHi; m += subdivMs) {
    const x = msToX(m);
    const isBeat = Math.abs(m % beatMs) < 0.01 || Math.abs(m % beatMs - beatMs) < 0.01;
    const isBar = Math.abs(m % (beatMs * 4)) < 0.01 || Math.abs(m % (beatMs * 4) - beatMs * 4) < 0.01;
    rctx.strokeStyle = isBar ? '#3a3a48' : (isBeat ? '#2a2a35' : '#1f1f28');
    rctx.lineWidth = 1;
    rctx.beginPath();
    rctx.moveTo(x + 0.5, ROLL_RULER_H);
    rctx.lineTo(x + 0.5, h);
    rctx.stroke();
  }

  // Loop region.
  const t = rollState.transport;
  if (t.looping) {
    const lx = msToX(t.loopStart);
    const rx = msToX(t.loopEnd);
    rctx.fillStyle = 'rgba(255,209,102,0.06)';
    rctx.fillRect(lx, ROLL_RULER_H, rx - lx, h - ROLL_RULER_H);
    rctx.strokeStyle = '#ffd166';
    rctx.lineWidth = 1;
    rctx.beginPath();
    rctx.moveTo(lx + 0.5, ROLL_RULER_H); rctx.lineTo(lx + 0.5, h);
    rctx.moveTo(rx + 0.5, ROLL_RULER_H); rctx.lineTo(rx + 0.5, h);
    rctx.stroke();
  }

  // Notes.
  for (const n of rollState.notes) {
    const x = msToX(n.start);
    const x2 = msToX(n.start + n.dur);
    const y = pitchToY(n.pitch);
    if (x2 < ROLL_LABEL_W || x > w || y < ROLL_RULER_H || y > h) continue;
    const selected = rollState.selection.has(n.id);
    const sounding = rollState.playbackActive.has(n.pitch) &&
      t.playing && t.cursorMs >= n.start && t.cursorMs < n.start + n.dur;
    rctx.fillStyle = selected
      ? '#ffd166'
      : (sounding ? '#ff8a4a' : '#ff6b35');
    rctx.fillRect(Math.max(ROLL_LABEL_W, x), y + 1, Math.max(2, x2 - x), v.rowHeight - 2);
    rctx.strokeStyle = 'rgba(0,0,0,0.4)';
    rctx.strokeRect(Math.max(ROLL_LABEL_W, x) + 0.5, y + 1.5, Math.max(2, x2 - x) - 1, v.rowHeight - 3);
  }

  // Live-incoming notes (from broadcast) drawn as floating bars at the cursor / right edge.
  if (lastSounding && lastSounding.length) {
    for (const p of lastSounding) {
      if (rollState.playbackActive.has(p)) continue; // already drawn as a note
      const y = pitchToY(p);
      if (y < ROLL_RULER_H - v.rowHeight || y > h) continue;
      // Show at the transport cursor if playing, else at right edge.
      const xCenter = t.playing ? msToX(t.cursorMs) : w - 20;
      rctx.fillStyle = 'rgba(124,217,146,0.85)'; // green
      rctx.fillRect(xCenter - 6, y + 1, 12, v.rowHeight - 2);
    }
  }

  // Playhead line (drawn under the ruler triangle, above notes).
  if (t.playing || t.cursorMs > 0) {
    const cx = msToX(t.cursorMs);
    if (cx >= ROLL_LABEL_W && cx <= w) {
      rctx.strokeStyle = '#7cd992';
      rctx.lineWidth = 1;
      rctx.beginPath();
      rctx.moveTo(cx + 0.5, ROLL_RULER_H);
      rctx.lineTo(cx + 0.5, h);
      rctx.stroke();
    }
  }

  // Marquee selection box.
  if (rollState.mouse.mode === 'marquee') {
    const m = rollState.mouse;
    const x1 = Math.min(m.startX, m.lastX), x2 = Math.max(m.startX, m.lastX);
    const y1 = Math.min(m.startY, m.lastY), y2 = Math.max(m.startY, m.lastY);
    rctx.fillStyle = 'rgba(255,209,102,0.1)';
    rctx.fillRect(x1, y1, x2 - x1, y2 - y1);
    rctx.strokeStyle = '#ffd166';
    rctx.strokeRect(x1 + 0.5, y1 + 0.5, x2 - x1, y2 - y1);
  }

  // Pitch label gutter — show every note name.
  rctx.fillStyle = '#14141a';
  rctx.fillRect(0, 0, ROLL_LABEL_W, h);
  // Highlight the hovered pitch label.
  if (rollState.hoveredPitch != null) {
    const hp = rollState.hoveredPitch;
    if (hp >= pLo && hp <= pHi) {
      const y = pitchToY(hp);
      rctx.fillStyle = 'rgba(255,107,53,0.18)';
      rctx.fillRect(0, y, ROLL_LABEL_W, v.rowHeight);
    }
  }
  rctx.font = '10px monospace';
  rctx.textBaseline = 'middle';
  for (let p = pLo; p <= pHi; p++) {
    const y = pitchToY(p) + v.rowHeight / 2;
    const isC = (p % 12 === 0);
    const isHover = (rollState.hoveredPitch === p);
    rctx.fillStyle = isHover ? '#ffd166' : (isC ? '#ff8a4a' : (isBlackKey(p) ? '#4a4a5a' : '#76768a'));
    rctx.fillText(pitchName(p), 4, y);
  }

  // Ruler (bigger now).
  rctx.fillStyle = '#14141a';
  rctx.fillRect(ROLL_LABEL_W, 0, w - ROLL_LABEL_W, ROLL_RULER_H);
  // Beat ticks in the ruler.
  for (let m = firstSub; m <= msHi; m += subdivMs) {
    const x = msToX(m);
    if (x < ROLL_LABEL_W) continue;
    const onBar = Math.abs(m % (beatMs * 4)) < 0.01 || Math.abs(m % (beatMs * 4) - beatMs * 4) < 0.01;
    const onBeat = Math.abs(m % beatMs) < 0.01 || Math.abs(m % beatMs - beatMs) < 0.01;
    if (!onBeat) continue;
    rctx.strokeStyle = onBar ? '#76768a' : '#3a3a48';
    rctx.lineWidth = 1;
    const tickLen = onBar ? 10 : 5;
    rctx.beginPath();
    rctx.moveTo(x + 0.5, ROLL_RULER_H);
    rctx.lineTo(x + 0.5, ROLL_RULER_H - tickLen);
    rctx.stroke();
  }
  // Bar numbers.
  rctx.fillStyle = '#a0a0b8';
  rctx.font = '11px monospace';
  rctx.textBaseline = 'top';
  const barMs = beatMs * 4;
  const firstBar = Math.floor(msLo / barMs) * barMs;
  for (let m = firstBar; m <= msHi; m += barMs) {
    const x = msToX(m);
    if (x < ROLL_LABEL_W) continue;
    const bar = Math.round(m / barMs) + 1;
    rctx.fillText(bar.toString(), x + 4, 3);
  }
  // Loop region tinted band in ruler too.
  if (t.looping) {
    const lx = msToX(t.loopStart);
    const rx = msToX(t.loopEnd);
    rctx.fillStyle = 'rgba(255,209,102,0.25)';
    rctx.fillRect(Math.max(ROLL_LABEL_W, lx), 0, rx - Math.max(ROLL_LABEL_W, lx), ROLL_RULER_H);
  }
  rctx.fillStyle = '#2a2a35';
  rctx.fillRect(0, ROLL_RULER_H - 1, w, 1);
  rctx.fillRect(ROLL_LABEL_W - 1, 0, 1, h);

  // Playhead triangle in the ruler, pointing down to the line.
  if (t.playing || t.cursorMs > 0) {
    const cx = msToX(t.cursorMs);
    if (cx >= ROLL_LABEL_W && cx <= w) {
      rctx.fillStyle = '#7cd992';
      rctx.beginPath();
      rctx.moveTo(cx, ROLL_RULER_H - 1);
      rctx.lineTo(cx - 6, ROLL_RULER_H - 11);
      rctx.lineTo(cx + 6, ROLL_RULER_H - 11);
      rctx.closePath();
      rctx.fill();
      rctx.strokeStyle = '#16161c';
      rctx.lineWidth = 1;
      rctx.stroke();
    }
  }

  // Recording indicator.
  if (rollState.recording) {
    rctx.fillStyle = 'rgba(255,80,80,0.9)';
    rctx.beginPath();
    rctx.arc(w - 14, ROLL_RULER_H / 2, 5, 0, Math.PI * 2);
    rctx.fill();
  }
}

// ---------- Hit testing ----------
function noteAt(x, y) {
  for (let i = rollState.notes.length - 1; i >= 0; i--) {
    const n = rollState.notes[i];
    const nx = msToX(n.start);
    const nx2 = msToX(n.start + n.dur);
    const ny = pitchToY(n.pitch);
    if (x >= Math.max(ROLL_LABEL_W, nx) && x <= nx2 && y >= ny + 1 && y <= ny + rollState.viewport.rowHeight - 1) {
      const onRightEdge = x >= nx2 - ROLL_RESIZE_EDGE;
      return { note: n, edge: onRightEdge ? 'right' : null };
    }
  }
  return null;
}
function loopHandleAt(x, y) {
  if (!rollState.transport.looping) return null;
  if (y > ROLL_RULER_H) return null;
  const lx = msToX(rollState.transport.loopStart);
  const rx = msToX(rollState.transport.loopEnd);
  if (Math.abs(x - lx) <= ROLL_LOOP_HANDLE) return 'L';
  if (Math.abs(x - rx) <= ROLL_LOOP_HANDLE) return 'R';
  return null;
}

// ---------- Mouse ----------
rollCanvas.addEventListener('mousedown', (e) => {
  const rect = rollCanvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  const m = rollState.mouse;
  m.startX = x; m.startY = y; m.lastX = x; m.lastY = y;

  // Middle-click pan, or alt-drag pan.
  if (e.button === 1 || e.altKey) {
    m.mode = 'scrollPan';
    return;
  }
  if (e.button !== 0) return;

  // Ruler: drag handles take priority, then drag-to-set-loop, then click-to-set-cursor.
  if (y < ROLL_RULER_H) {
    const handle = loopHandleAt(x, y);
    if (handle) {
      rollSnapshot();
      m.mode = handle === 'L' ? 'loopL' : 'loopR';
      return;
    }
    m.mode = 'rulerPending';
    m.rulerDownMs = Math.max(0, xToMs(x));
    return;
  }

  const hit = noteAt(x, y);
  if (hit) {
    const id = hit.note.id;
    if (!rollState.selection.has(id)) {
      if (!e.shiftKey) rollState.selection.clear();
      rollState.selection.add(id);
    } else if (e.shiftKey) {
      rollState.selection.delete(id);
    }
    if (hit.edge === 'right') {
      rollSnapshot();
      m.mode = 'resize';
      m.resizeOriginalDur = hit.note.dur;
    } else {
      rollSnapshot();
      m.mode = 'move';
      m.dragOffsetMs = xToMs(x) - hit.note.start;
      m.dragOffsetPitch = yToPitch(y) - hit.note.pitch;
      m.moveOriginals = new Map();
      m.movePivotId = hit.note.id;
      for (const sid of rollState.selection) {
        const n = rollState.notes.find(nn => nn.id === sid);
        if (n) m.moveOriginals.set(sid, { start: n.start, pitch: n.pitch });
      }
      rollAuditionOn(hit.note.pitch);
    }
    rollRender();
    return;
  }

  // Empty space: draw or marquee.
  if (e.shiftKey) {
    m.mode = 'marquee';
  } else {
    rollSnapshot();
    const startMs = Math.max(0, snapMs(xToMs(x)));
    const pitch = clampPitch(yToPitch(y));
    const id = rollState.nextId++;
    const note = { id, pitch, start: startMs, dur: snapMs(60000 / rollState.bpm / 4), vel: 0.8, ch: 0 };
    rollState.notes.push(note);
    rollState.selection.clear();
    rollState.selection.add(id);
    m.mode = 'draw';
    m.drawNoteId = id;
    rollAuditionOn(pitch);
  }
  rollRender();
});
rollCanvas.addEventListener('mousemove', (e) => {
  const rect = rollCanvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  const m = rollState.mouse;
  const dx = x - m.lastX, dy = y - m.lastY;
  m.lastX = x; m.lastY = y;

  // Track hovered pitch for row highlight.
  const newHover = (y > ROLL_RULER_H && x > ROLL_LABEL_W) ? clampPitch(yToPitch(y)) : null;
  if (newHover !== rollState.hoveredPitch) {
    rollState.hoveredPitch = newHover;
    rollRender();
  }

  // Cursor feedback when idle.
  if (m.mode === 'idle') {
    const hit = noteAt(x, y);
    rollCanvas.style.cursor =
      hit ? (hit.edge === 'right' ? 'ew-resize' : 'move') :
      (y < ROLL_RULER_H && loopHandleAt(x, y) ? 'ew-resize' : (y < ROLL_RULER_H ? 'pointer' : 'crosshair'));
    return;
  }

  // Ruler: click vs drag detection.
  if (m.mode === 'rulerPending') {
    if (Math.abs(x - m.startX) > ROLL_DRAG_THRESHOLD) {
      rollSnapshot();
      rollState.transport.looping = true;
      m.mode = 'rulerLoop';
    } else {
      return;
    }
  }
  if (m.mode === 'rulerLoop') {
    const a = m.rulerDownMs;
    const b = Math.max(0, xToMs(x));
    const lo = snapMs(Math.min(a, b));
    const hi = snapMs(Math.max(a, b));
    rollState.transport.loopStart = Math.max(0, lo);
    rollState.transport.loopEnd = Math.max(rollState.transport.loopStart + 100, hi);
    rollRender();
    return;
  }

  if (m.mode === 'scrollPan') {
    rollState.viewport.scrollX -= dx / rollState.viewport.pxPerMs;
    rollState.viewport.scrollY += dy / rollState.viewport.rowHeight;
    clampViewport();
    rollRender();
    return;
  }
  if (m.mode === 'draw') {
    const n = rollState.notes.find(nn => nn.id === m.drawNoteId);
    if (n) {
      const endMs = Math.max(n.start + 20, snapMs(xToMs(x)));
      n.dur = endMs - n.start;
      rollRender();
    }
    return;
  }
  if (m.mode === 'move') {
    const dMs = xToMs(x) - xToMs(m.startX);
    const dPitch = yToPitch(y) - yToPitch(m.startY);
    for (const [id, orig] of m.moveOriginals.entries()) {
      const n = rollState.notes.find(nn => nn.id === id);
      if (n) {
        n.start = Math.max(0, snapMs(orig.start + dMs));
        n.pitch = clampPitch(orig.pitch + dPitch);
      }
    }
    // Re-audition if the clicked note's pitch changed.
    const pivot = rollState.notes.find(nn => nn.id === m.movePivotId);
    if (pivot && pivot.pitch !== rollState.auditionPitch) {
      rollAuditionOn(pivot.pitch);
    }
    rollRender();
    return;
  }
  if (m.mode === 'resize') {
    for (const id of rollState.selection) {
      const n = rollState.notes.find(nn => nn.id === id);
      if (n) {
        const endMs = Math.max(n.start + 20, snapMs(xToMs(x)));
        n.dur = endMs - n.start;
      }
    }
    rollRender();
    return;
  }
  if (m.mode === 'marquee') {
    rollRender();
    return;
  }
  if (m.mode === 'loopL') {
    rollState.transport.loopStart = Math.max(0, Math.min(rollState.transport.loopEnd - 100, snapMs(xToMs(x))));
    rollRender();
    return;
  }
  if (m.mode === 'loopR') {
    rollState.transport.loopEnd = Math.max(rollState.transport.loopStart + 100, snapMs(xToMs(x)));
    rollRender();
    return;
  }
});
rollCanvas.addEventListener('mouseup', (e) => {
  const m = rollState.mouse;
  if (m.mode === 'marquee') {
    const rect = rollCanvas.getBoundingClientRect();
    const x = e.clientX - rect.left, y = e.clientY - rect.top;
    const x1 = Math.min(m.startX, x), x2 = Math.max(m.startX, x);
    const y1 = Math.min(m.startY, y), y2 = Math.max(m.startY, y);
    if (!e.shiftKey) rollState.selection.clear();
    for (const n of rollState.notes) {
      const nx = msToX(n.start), nx2 = msToX(n.start + n.dur);
      const ny = pitchToY(n.pitch);
      if (nx2 >= x1 && nx <= x2 && ny + rollState.viewport.rowHeight >= y1 && ny <= y2) {
        rollState.selection.add(n.id);
      }
    }
  }
  if (m.mode === 'rulerPending') {
    // Click without drag — move the playback cursor.
    rollState.transport.cursorMs = m.rulerDownMs;
  }
  rollAuditionOff();
  m.mode = 'idle';
  m.drawNoteId = null;
  m.moveOriginals = null;
  m.movePivotId = null;
  rollRender();
});
rollCanvas.addEventListener('mouseleave', () => {
  if (rollState.hoveredPitch != null) {
    rollState.hoveredPitch = null;
    rollRender();
  }
});

// Wheel: vertical (pitch) by default, shift=horizontal (time), ctrl=zoom (anchored to left edge).
rollCanvas.addEventListener('wheel', (e) => {
  e.preventDefault();
  if (e.ctrlKey || e.metaKey) {
    // Anchor zoom to the leftmost visible ms — scrollX stays put.
    const factor = e.deltaY < 0 ? 1.15 : 1 / 1.15;
    rollState.viewport.pxPerMs = Math.max(0.02, Math.min(2, rollState.viewport.pxPerMs * factor));
    document.getElementById('rollZoom').value = rollState.viewport.pxPerMs.toFixed(3);
  } else if (e.shiftKey) {
    rollState.viewport.scrollX += e.deltaY / rollState.viewport.pxPerMs;
  } else {
    rollState.viewport.scrollY += e.deltaY / rollState.viewport.rowHeight / 4;
  }
  clampViewport();
  rollRender();
}, { passive: false });

// Roll keydown runs in CAPTURE phase so it sees the event before the synth's
// document-level keydown handler. When it handles a key, it stops propagation
// so the synth keyboard doesn't also fire a note for the same press.
window.addEventListener('keydown', (e) => {
  if (document.getElementById('roll-view').hidden) return;
  if (e.target.tagName === 'INPUT') return;
  let handled = false;
  if (e.key === 'Delete' || e.key === 'Backspace') {
    if (rollState.selection.size) {
      rollSnapshot();
      rollState.notes = rollState.notes.filter(n => !rollState.selection.has(n.id));
      rollState.selection.clear();
      rollRender();
    }
    handled = true;
  } else if (e.key === ' ') {
    rollTogglePlay();
    handled = true;
  } else if ((e.key === 'z' || e.key === 'Z') && (e.ctrlKey || e.metaKey)) {
    rollUndo();
    handled = true;
  } else if ((e.key === 'a' || e.key === 'A') && (e.ctrlKey || e.metaKey)) {
    rollState.selection = new Set(rollState.notes.map(n => n.id));
    rollRender();
    handled = true;
  } else if (e.key === 'Home') {
    rollHome();
    handled = true;
  }
  if (handled) {
    e.preventDefault();
    e.stopImmediatePropagation();
  }
}, true);

function clampPitch(p) { return Math.max(ROLL_PITCH_LOW, Math.min(ROLL_PITCH_HIGH, p)); }
function clampViewport() {
  const v = rollState.viewport;
  if (v.scrollX < 0) v.scrollX = 0;
  const maxScrollY = (ROLL_PITCH_HIGH - ROLL_PITCH_LOW + 1) - (rollH() - ROLL_RULER_H) / v.rowHeight;
  if (v.scrollY > maxScrollY) v.scrollY = Math.max(0, maxScrollY);
  if (v.scrollY < 0) v.scrollY = 0;
}
function snapMs(ms) {
  // Snap to 1/32 for fine but reasonable resolution.
  const subdiv = (60000 / rollState.bpm) / 8;
  return Math.round(ms / subdiv) * subdiv;
}

// ---------- Transport ----------
function rollTogglePlay() {
  const t = rollState.transport;
  if (t.playing) { rollStop(); return; }
  // If we have a loop region and the cursor is before it, snap to loop start.
  if (t.looping && t.cursorMs < t.loopStart) {
    t.cursorMs = t.loopStart;
  }
  t.playing = true;
  t.startWall = performance.now();
  t.cursorAtStart = t.cursorMs;
  document.getElementById('rollPlay').textContent = '❚❚ Pause';
  document.getElementById('rollPlay').classList.add('on');
}
function rollStop() {
  const t = rollState.transport;
  t.playing = false;
  // Release any still-sounding playback notes.
  for (const { pitch } of t.activeOffs.values()) {
    send({ type: 'noteOff', note: pitch });
  }
  t.activeOffs.clear();
  rollState.playbackActive.clear();
  document.getElementById('rollPlay').textContent = '▶ Play';
  document.getElementById('rollPlay').classList.remove('on');
  rollRender();
}
function rollClearLoop() {
  if (!rollState.transport.looping) return;
  rollSnapshot();
  rollState.transport.looping = false;
  rollRender();
}
function rollHome() {
  const t = rollState.transport;
  // Kill any playback notes that are sounding so they don't hang past the jump.
  for (const { pitch } of t.activeOffs.values()) {
    send({ type: 'noteOff', note: pitch });
  }
  t.activeOffs.clear();
  rollState.playbackActive.clear();
  t.cursorMs = 0;
  if (t.playing) {
    t.cursorAtStart = 0;
    t.startWall = performance.now();
  }
  rollRender();
}
function rollToggleRec() {
  rollState.recording = !rollState.recording;
  document.getElementById('rollRec').classList.toggle('on', rollState.recording);
  rollRender();
}
function rollSetBpm(v) { rollState.bpm = Math.max(20, Math.min(300, +v || 120)); rollRender(); }
function rollSetZoom(v) {
  rollState.viewport.pxPerMs = Math.max(0.02, Math.min(2, +v || 0.2));
  rollRender();
}
function rollClear() {
  if (!confirm('Clear all notes?')) return;
  rollSnapshot();
  rollState.notes = [];
  rollState.selection.clear();
  rollRender();
}
function rollQuantize() {
  const subdiv = (60000 / rollState.bpm) / 4; // 1/16
  rollSnapshot();
  for (const n of rollState.notes) {
    n.start = Math.round(n.start / subdiv) * subdiv;
  }
  rollRender();
}

// ---------- Audition (sound the note while drawing/moving) ----------
// Uses send() directly to bypass the noteOn/noteOff record-capture wrappers.
function rollAuditionOn(pitch) {
  if (rollState.auditionPitch === pitch) return;
  if (rollState.auditionPitch !== null) {
    send({ type: 'noteOff', note: rollState.auditionPitch });
  }
  rollState.auditionPitch = pitch;
  send({ type: 'noteOn', note: pitch, velocity: 0.75 });
}
function rollAuditionOff() {
  if (rollState.auditionPitch !== null) {
    send({ type: 'noteOff', note: rollState.auditionPitch });
    rollState.auditionPitch = null;
  }
}

// ---------- Undo ----------
function rollSnapshot() {
  const snap = JSON.stringify({
    notes: rollState.notes,
    looping: rollState.transport.looping,
    loopStart: rollState.transport.loopStart,
    loopEnd: rollState.transport.loopEnd,
    nextId: rollState.nextId,
  });
  rollState.undo.push(snap);
  if (rollState.undo.length > ROLL_UNDO_LIMIT) rollState.undo.shift();
}
function rollUndo() {
  const snap = rollState.undo.pop();
  if (!snap) return;
  const s = JSON.parse(snap);
  rollState.notes = s.notes;
  rollState.transport.looping = s.looping;
  rollState.transport.loopStart = s.loopStart;
  rollState.transport.loopEnd = s.loopEnd;
  rollState.nextId = s.nextId;
  rollState.selection.clear();
  rollRender();
}

const TRANSPORT_TICK_MS = 8;
setInterval(() => {
  const t = rollState.transport;
  if (t.playing) {
    const wall = performance.now();
    let cursor = t.cursorAtStart + (wall - t.startWall);
    if (t.looping && cursor >= t.loopEnd) {
      // Loop wrap: silence any held notes, reset start.
      for (const { pitch } of t.activeOffs.values()) {
        send({ type: 'noteOff', note: pitch });
      }
      t.activeOffs.clear();
      rollState.playbackActive.clear();
      t.cursorAtStart = t.loopStart;
      t.startWall = wall;
      cursor = t.loopStart;
    }
    t.cursorMs = cursor;
    // Schedule notes whose start is within the next tick window.
    const horizon = cursor + TRANSPORT_TICK_MS + 2;
    for (const n of rollState.notes) {
      if (n.start <= cursor && n.start + n.dur > cursor && !t.activeOffs.has(n.id)) {
        // Edge-case: skipped over briefly; fire now if duration still remains.
        const offMs = n.start + n.dur;
        send({ type: 'noteOn', note: n.pitch, velocity: n.vel });
        t.activeOffs.set(n.id, { offMs, pitch: n.pitch });
        rollState.playbackActive.add(n.pitch);
      } else if (n.start > cursor && n.start < horizon && !t.activeOffs.has(n.id)) {
        // Will trigger within window; fire at next tick (acceptable latency).
        send({ type: 'noteOn', note: n.pitch, velocity: n.vel });
        t.activeOffs.set(n.id, { offMs: n.start + n.dur, pitch: n.pitch });
        rollState.playbackActive.add(n.pitch);
      }
    }
    // Fire offs that are due.
    for (const [id, info] of [...t.activeOffs.entries()]) {
      if (info.offMs <= cursor) {
        send({ type: 'noteOff', note: info.pitch });
        t.activeOffs.delete(id);
        rollState.playbackActive.delete(info.pitch);
      }
    }
    if (!document.getElementById('roll-view').hidden) rollRender();
  }
}, TRANSPORT_TICK_MS);

// ---------- Recording capture (called from noteOn/noteOff wrappers) ----------
function rollCaptureNoteOn(pitch, vel) {
  const t = rollState.transport;
  const startMs = t.playing ? t.cursorMs : (rollState.recordingNotes.size === 0 ? 0 : performance.now() - rollRecBase);
  if (!t.playing && rollState.recordingNotes.size === 0) rollRecBase = performance.now();
  const note = { id: rollState.nextId++, pitch, start: snapMs(startMs), dur: 200, vel, ch: 0 };
  rollState.notes.push(note);
  rollState.recordingNotes.set(pitch, note);
  rollRender();
}
function rollCaptureNoteOff(pitch) {
  const t = rollState.transport;
  const note = rollState.recordingNotes.get(pitch);
  if (!note) return;
  const endMs = t.playing ? t.cursorMs : performance.now() - rollRecBase;
  note.dur = Math.max(50, snapMs(endMs - note.start));
  rollState.recordingNotes.delete(pitch);
  rollRender();
}
let rollRecBase = 0;

// ---------- JSONL save/load ----------
function rollSave() {
  // Emit a minimal session header + paired note_on/off events sorted by time.
  const events = [];
  events.push({ t: 0, type: 'session_start', v: 1, wall_unix: Math.floor(Date.now() / 1000), patch: null, source: 'roll' });
  const sorted = [...rollState.notes].sort((a, b) => a.start - b.start);
  for (const n of sorted) {
    events.push({ t: Math.round(n.start), type: 'note_on', id: n.id, ch: n.ch || 0, note: n.pitch, vel: n.vel });
    events.push({ t: Math.round(n.start + n.dur), type: 'note_off', id: n.id, ch: n.ch || 0, note: n.pitch });
  }
  events.sort((a, b) => a.t - b.t);
  const lines = events.map(e => JSON.stringify(e)).join('\n');
  const blob = new Blob([lines + '\n'], { type: 'application/jsonl' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `roll_${Date.now()}.jsonl`;
  a.click();
  URL.revokeObjectURL(a.href);
}
function rollLoad(ev) {
  const file = ev.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    const text = String(reader.result || '');
    const ons = new Map(); // id -> {pitch, start, vel, ch}
    const notes = [];
    let maxId = 0;
    for (const line of text.split('\n')) {
      if (!line.trim()) continue;
      let e;
      try { e = JSON.parse(line); } catch { continue; }
      if (e.type === 'note_on') {
        ons.set(e.id, { pitch: e.note, start: e.t, vel: e.vel ?? 0.8, ch: e.ch ?? 0 });
        if (e.id > maxId) maxId = e.id;
      } else if (e.type === 'note_off') {
        const on = ons.get(e.id);
        if (on) {
          notes.push({ id: e.id, pitch: on.pitch, start: on.start, dur: Math.max(20, e.t - on.start), vel: on.vel, ch: on.ch });
          ons.delete(e.id);
        }
      }
    }
    // Any unmatched on: give a default 200ms duration.
    for (const [id, on] of ons.entries()) {
      notes.push({ id, pitch: on.pitch, start: on.start, dur: 200, vel: on.vel, ch: on.ch });
    }
    rollSnapshot();
    rollState.notes = notes;
    rollState.nextId = Math.max(maxId + 1, 1);
    rollState.selection.clear();
    rollRender();
  };
  reader.readAsText(file);
  ev.target.value = ''; // allow re-load of same file
}

// ---------- Eat all right-clicks (page-wide) ----------
window.addEventListener('contextmenu', (e) => e.preventDefault());

// ---------- Boot ----------
buildUI();
buildKeyboard();
refreshOctaveDisplay();
connect();
// Initial roll render so it's ready when the user clicks the tab.
requestAnimationFrame(() => { rollResize(); rollRender(); });
</script>
</body>
</html>
